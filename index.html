<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLT Demo</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f5f7;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      width: min(92vw, 900px);
      background: #ffffff;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 1.6rem;
      font-weight: 650;
      text-align: center;
    }

    video {
      width: 100%;
      border-radius: 14px;
      background: #000;
      display: block;
    }
  </style>
</head>

<body>
  <main>
    <h1>SLT Demo</h1>

    <video controls playsinline preload="metadata">
      <source src="videos/SLT_demo_mic_input.mp4" type="video/mp4" />
    </video>
  </main>
</body>
</html>
