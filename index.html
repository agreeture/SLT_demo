<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLT Demo</title>

  <style>
    :root {
      --bg: #f3f5f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, #e8eefc 0, transparent 32%),
        var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    main {
      width: min(100%, 760px);
    }

    .header {
      text-align: center;
      margin-bottom: 22px;
    }

    .title {
      margin: 0;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
    }

    .video-frame {
      border-radius: 16px;
      overflow: hidden;
      background: #000;
    }

    video {
      display: block;
      width: 100%;
      max-height: 70vh;
      background: #000;
    }

    .caption {
      margin-top: 14px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      body {
        padding: 24px 14px;
      }

      main {
        width: min(100%, 520px);
      }

      .title {
        font-size: 1.45rem;
      }

      .card {
        padding: 12px;
        border-radius: 18px;
      }

      .video-frame {
        border-radius: 13px;
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="header">
      <h1 class="title">SLT Demo mic</h1>
      <p class="subtitle">Mobile voice conversion demo</p>
    </div>

    <section class="card">
      <div class="video-frame">
        <video controls playsinline preload="metadata">
          <source src="videos/SLT_demo_mic_input.mp4" type="video/mp4" />
        </video>
      </div>
      <div class="caption">Microphone Input</div>
    </section>
  </main>
</body>
</html>
